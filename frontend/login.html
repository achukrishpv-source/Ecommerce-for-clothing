<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ASKR Clothing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-bg-glow top-right"></div>
  <div class="auth-bg-glow bottom-left"></div>

  <div class="auth-card animate-fadeInUp">
    <div class="auth-logo">
      <img src="askr-logo.png" alt="ASKR Logo" onerror="this.style.display='none'" />
      <div class="auth-logo-text">ASK<span>R</span></div>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your ASKR account</p>

    <form data-ajax data-redirect="home.html">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative">
          <span class="input-icon" style="top:50%;transform:translateY(-50%);position:absolute;left:14px">📧</span>
          <input type="email" class="form-control form-control-icon" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <span class="input-icon" style="top:50%;transform:translateY(-50%);position:absolute;left:14px">🔒</span>
          <input type="password" class="form-control form-control-icon" placeholder="Enter your password" required style="padding-right:44px" />
          <span class="password-toggle" style="position:absolute;right:14px;top:50%;transform:translateY(-50%)">👁️</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <label class="form-check">
          <input type="checkbox" class="form-check-input" />
          <span class="form-check-label">Remember me</span>
        </label>
        <a href="#" style="font-size:0.82rem;color:var(--orange);">Forgot Password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
    </form>

    <div class="auth-divider"><span>or continue with</span></div>
    <div class="social-login">
      <button class="social-btn">🔵 Google</button>
      <button class="social-btn">🔷 Facebook</button>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create Account</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
