<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – ASKR Clothing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-bg-glow top-right"></div>
  <div class="auth-bg-glow bottom-left"></div>

  <div class="auth-card animate-fadeInUp" style="max-width:520px">
    <div class="auth-logo">
      <img src="askr-logo.png" alt="ASKR Logo" onerror="this.style.display='none'" />
      <div class="auth-logo-text">ASK<span>R</span></div>
    </div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join the ASKR family today</p>

    <form data-ajax data-redirect="home.html">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%)">👤</span>
          <input type="text" class="form-control form-control-icon" placeholder="Your full name" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%)">📧</span>
          <input type="email" class="form-control form-control-icon" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%)">📱</span>
          <input type="tel" class="form-control form-control-icon" placeholder="+91 98765 43210" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%)">🔒</span>
          <input type="password" class="form-control form-control-icon" placeholder="Min. 8 characters" required style="padding-right:44px" />
          <span class="password-toggle" style="position:absolute;right:14px;top:50%;transform:translateY(-50%)">👁️</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%)">🔐</span>
          <input type="password" class="form-control form-control-icon" placeholder="Re-enter your password" required style="padding-right:44px" />
          <span class="password-toggle" style="position:absolute;right:14px;top:50%;transform:translateY(-50%)">👁️</span>
        </div>
      </div>
      <label class="form-check" style="margin-bottom:24px">
        <input type="checkbox" class="form-check-input" required />
        <span class="form-check-label">I agree to the <a href="terms.html" style="color:var(--orange)">Terms</a> &amp; <a href="privacy.html" style="color:var(--orange)">Privacy Policy</a></span>
      </label>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
    </form>

    <div class="auth-divider"><span>or sign up with</span></div>
    <div class="social-login">
      <button class="social-btn">🔵 Google</button>
      <button class="social-btn">🔷 Facebook</button>
    </div>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
