<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart – ASKR Clothing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="navbar-container" data-page=""></div>
<div class="page-wrapper">
  <div class="page-hero">
    <div class="container">
      <h1 class="page-hero-title">Shopping <span>Cart</span></h1>
      <p class="page-hero-subtitle">Review your items before checkout</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="cart-layout">
        <!-- CART ITEMS -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <h3 style="font-size:1.1rem;font-weight:700;color:var(--ivory)">Cart Items <span id="cart-count-label" style="color:var(--gray-600);font-size:0.9rem;font-weight:400"></span></h3>
            <button class="btn btn-sm btn-secondary" onclick="ASKR.cart=[];ASKR.saveCart();ASKR.updateCartBadge();renderCart();showToast('Cart cleared','info')">Clear Cart</button>
          </div>

          <div id="cart-items-container"></div>

          <div style="margin-top:20px;padding:16px 20px;background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.15);border-radius:12px;font-size:0.85rem;color:var(--gray-600);display:flex;gap:10px;align-items:center">
            <span>🎁</span><span>Free delivery on all orders!</span>
          </div>
          <div style="margin-top:20px">
            <a href="home.html" style="color:var(--orange);font-size:0.88rem;font-weight:500">← Continue Shopping</a>
          </div>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="order-summary">
          <div class="summary-title">Order Summary</div>
          <div class="coupon-input">
            <input type="text" class="form-control coupon-code-input" placeholder="Coupon Code (ASKR10)" />
            <button class="btn btn-outline-orange btn-sm apply-coupon">Apply</button>
          </div>
          <div class="summary-row"><span class="label">Subtotal (<span id="cart-item-count"></span>)</span><span class="value" id="cart-subtotal">₹0</span></div>
          <div class="summary-row summary-discount" style="display:none"><span class="label" style="color:#4CAF50">Coupon Discount</span><span class="value" style="color:#4CAF50">− ₹0</span></div>
          <div class="summary-row"><span class="label">Delivery</span><span class="value" style="color:#4CAF50">FREE</span></div>
          <div class="summary-row"><span class="label">Tax (GST 5%)</span><span class="value" id="cart-tax">₹0</span></div>
          <div class="summary-row total"><span class="label">Total</span><span class="value" id="cart-total">₹0</span></div>
          <a href="checkout.html" class="btn btn-primary btn-lg" style="width:100%;margin-top:20px;justify-content:center">Proceed to Checkout →</a>
          <div class="security-badges" style="justify-content:center;margin-top:16px">
            <div class="security-badge">🔒 SSL Secure</div>
            <div class="security-badge">✅ 100% Safe</div>
          </div>
          <div style="text-align:center;margin-top:16px">
            <div style="font-size:0.75rem;color:var(--gray-500);margin-bottom:10px">We accept</div>
            <div class="footer-payment-icons" style="justify-content:center">
              <span class="payment-icon">UPI</span>
              <span class="payment-icon">VISA</span>
              <span class="payment-icon">MC</span>
              <span class="payment-icon">COD</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
<div id="footer-container"></div>
<div class="toast-container"></div>
<script src="components.js"></script>
<script src="app.js"></script>
</body>
</html>
